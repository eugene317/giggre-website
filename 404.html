<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Giggre</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #2d3748; display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1B6CA8 0%, #154f80 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }
    header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .error-code {
      font-size: 96px;
      font-weight: 900;
      color: #1B6CA8;
      line-height: 1;
      margin-bottom: 8px;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #718096;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #1B6CA8;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .btn:hover { background: #154f80; }

    footer { text-align: center; padding: 24px; font-size: 13px; color: #a0aec0; }
    footer a { color: #1B6CA8; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>Giggre</h1>
</header>

<div class="container">
  <div class="error-icon">🔍</div>
  <div class="error-code">404</div>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <a href="/" class="btn">Go Back Home</a>
</div>

<footer>
  &copy; 2026 Giggre. All rights reserved. &nbsp;·&nbsp; <a href="mailto:support@giggre.app">support@giggre.app</a>
</footer>

</body>
</html>
